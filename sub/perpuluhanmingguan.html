<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPORAN PERPULUHAN MINGGUAN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans+Condensed:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: 'Reddit Sans Condensed', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header-bar {
            background-color: #1a1a1a;
            color: #ffd700;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .header-bar h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        /* Desain tombol ikon bulat minimalis */
        .icon-btn {
            background-color: #262626;
            color: #ffd700;
            border: 1px solid #ffd700;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .icon-btn:hover {
            background-color: #ffd700;
            color: #121212;
            transform: scale(1.05);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Laporan Perpuluhan Mingguan</h1>
        <div class="action-buttons">
            <a href="https://docs.google.com/spreadsheets/d/1rJaeVeiQFcmOx0pofdl_jEit9inQLBpf5fJi97T_NvQ/edit" target="_blank" class="icon-btn" title="Edit Spreadsheet">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1rJaeVeiQFcmOx0pofdl_jEit9inQLBpf5fJi97T_NvQ/export?format=xlsx" target="_blank" class="icon-btn" title="Download Excel (.xlsx)">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1rJaeVeiQFcmOx0pofdl_jEit9inQLBpf5fJi97T_NvQ/export?format=pdf&size=A4&portrait=true&fitw=true" target="_blank" class="icon-btn" title="Download PDF">
                <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v1.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75V8c0-.55.45-1 1-1H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5c-.28 0-.5-.22-.5-.5v-5c0-.28.22-.5 1-.5h2.5c.83 0 1.5.67 1.5 1.5v3zm4-2.5c0 .41-.34.75-.75.75H19v1h.75c.41 0 .75.34.75.75s-.34.75-.75.75H19v1.25c0 .41-.34.75-.75.75s-.75-.34-.75-.75V8c0-.55.45-1 1-1h1.5c.41 0 .75.34.75.75v1zM9 10h1V8H9v2zm5.5 2h1V8h-1v4zM2 6c-.55 0-1 .45-1 1v13c0 1.1.9 2 2 2h13c.55 0 1-.45 1-1s-.45-1-1-1H4c-.55 0-1-.45-1-1V7c0-.55-.45-1-1-1z"/></svg>
            </a>
        </div>
    </div>

    <iframe 
        class="iframe-container" 
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShcacTBlNgsp7mvJ_DumrWj5N8HUQX4T55Xiby529gDoTnIxH_IOk36B5bknur77_QmcNjDV_8MG52/pubhtml?widget=true&amp;headers=false">
    </iframe>

</body>
</html>
